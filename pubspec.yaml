name: ranjitzu
description: Random BJJ prompt generator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  http: ^1.2.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/moves.json
    - assets/sounds/buzzer.wav

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"

flutter_native_splash:
  color: "#12121F"
  image: assets/splash_logo.png
  color_dark: "#12121F"
  image_dark: assets/splash_logo.png
  android_12:
    image: assets/splash_logo.png
    color: "#12121F"
  fullscreen: true